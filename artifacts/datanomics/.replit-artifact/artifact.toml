kind = "web"
previewPath = "/"
title = "Datanomics Job Search OS"
version = "1.0.0"
id = "artifacts/datanomics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26091

[services.development]
run = "pnpm --filter @workspace/datanomics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/datanomics", "run", "build" ]
publicDir = "artifacts/datanomics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26091"
BASE_PATH = "/"
